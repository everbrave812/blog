<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Jun's Notes</title>
</head>
<body bgcolor="#FFFFFF" text="#000000" link="#0000EE" vlink="#551A8B">
<font face="Times New Roman, Times, serif">

<h2>Jun's Notes</h2>

<p>학습 기록과 개인적인 글을 남기는 공간입니다.</p>

<hr>

<p id="cat-filters">분류: <a href="index.html">[전체]</a></p>

<div id="post-list">불러오는 중...</div>

<hr>

<p><small>Last updated: <span id="updated"></span></small></p>
<p><small><a href="admin.html">관리자</a></small></p>

<script>
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

var params = new URLSearchParams(location.search);
var activeCategory = params.get("cat");

fetch("posts.json?_=" + Date.now())
  .then(function (r) { return r.json(); })
  .then(function (posts) {
    posts.sort(function (a, b) { return b.date.localeCompare(a.date); });

    var categories = [];
    posts.forEach(function (p) {
      if (categories.indexOf(p.category) === -1) categories.push(p.category);
    });

    var filterHtml = "분류: <a href=\"index.html\">[전체]</a> ";
    categories.forEach(function (c) {
      filterHtml += "<a href=\"index.html?cat=" + encodeURIComponent(c) + "\">[" + escapeHtml(c) + "]</a> ";
    });
    document.getElementById("cat-filters").innerHTML = filterHtml;

    var visible = activeCategory
      ? posts.filter(function (p) { return p.category === activeCategory; })
      : posts;

    if (visible.length === 0) {
      document.getElementById("post-list").innerHTML = "<p>글이 없습니다.</p>";
      return;
    }

    var byYear = {};
    var years = [];
    visible.forEach(function (p) {
      var y = p.date.slice(0, 4);
      if (!byYear[y]) { byYear[y] = []; years.push(y); }
      byYear[y].push(p);
    });
    years.sort().reverse();

    var html = "";
    years.forEach(function (y) {
      html += "<h3>" + y + "</h3><table cellpadding=\"2\" cellspacing=\"0\" border=\"0\">";
      byYear[y].forEach(function (p) {
        html += "<tr>";
        html += "<td valign=\"top\">" + escapeHtml(p.date) + "</td>";
        html += "<td>&nbsp;</td>";
        html += "<td>[" + escapeHtml(p.category) + "]</td>";
        html += "<td>&nbsp;</td>";
        html += "<td><a href=\"post.html?slug=" + encodeURIComponent(p.slug) + "\">" + escapeHtml(p.title) + "</a></td>";
        html += "</tr>";
      });
      html += "</table>";
    });
    document.getElementById("post-list").innerHTML = html;
  })
  .catch(function (e) {
    document.getElementById("post-list").innerHTML = "<p>글 목록을 불러오지 못했습니다.</p>";
  });

document.getElementById("updated").textContent = new Date().toISOString().slice(0, 10).replace(/-/g, ".");
</script>

</font>
</body>
</html>
