<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Jun's Notes</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="render.js"></script>
</head>
<body bgcolor="#FFFFFF" text="#000000" link="#0000EE" vlink="#551A8B">
<font face="Times New Roman, Times, serif">

<p><a href="index.html">&lt;&lt; 목록으로</a></p>

<div id="post">불러오는 중...</div>

<p><a href="index.html">&lt;&lt; 목록으로</a></p>

<script>
var slug = new URLSearchParams(location.search).get("slug");

fetch("posts.json?_=" + Date.now())
  .then(function (r) { return r.json(); })
  .then(function (posts) {
    var post = posts.filter(function (p) { return p.slug === slug; })[0];
    if (!post) {
      document.getElementById("post").innerHTML = "<p>글을 찾을 수 없습니다.</p>";
      return;
    }
    document.title = post.title + " - Jun's Notes";
    var html = "";
    html += "<h2>" + escapeHtml(post.title) + "</h2>";
    html += "<p><small>" + escapeHtml(post.date) + " [" + escapeHtml(post.category) + "]</small></p>";
    html += "<hr>";
    html += "<div class=\"content\">" + renderMarkdownWithMath(post.content) + "</div>";
    document.getElementById("post").innerHTML = html;
  })
  .catch(function () {
    document.getElementById("post").innerHTML = "<p>글을 불러오지 못했습니다.</p>";
  });
</script>

</font>
</body>
</html>
